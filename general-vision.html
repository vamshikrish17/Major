<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>General Vision</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(34, 211, 238, 0.16), transparent 32%),
                radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.18), transparent 34%),
                #07111f;
            color: #f8fafc;
            font-family: Inter, system-ui, sans-serif;
        }

        .shell {
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .bar {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.18);
            background: rgba(7, 17, 31, 0.9);
            backdrop-filter: blur(14px);
        }

        .title {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #67e8f9;
        }

        .subtitle {
            margin: 6px 0 0;
            color: rgba(226, 232, 240, 0.72);
            font-size: 0.95rem;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="bar">
            <h1 class="title">General Vision</h1>
            <p class="subtitle">Standalone scene-analysis page for broad visual understanding.</p>
        </header>
        <iframe src="/frontend/general-vision.html" title="General Vision"></iframe>
    </div>
</body>
</html>

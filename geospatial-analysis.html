<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Spatial Analysis</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(234, 179, 8, 0.16), transparent 32%),
                radial-gradient(circle at bottom right, rgba(249, 115, 22, 0.18), transparent 34%),
                #16110a;
            color: #f8fafc;
            font-family: Inter, system-ui, sans-serif;
        }

        .shell {
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .bar {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(251, 191, 36, 0.18);
            background: rgba(22, 17, 10, 0.9);
            backdrop-filter: blur(14px);
        }

        .title {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #fbbf24;
        }

        .subtitle {
            margin: 6px 0 0;
            color: rgba(254, 243, 199, 0.72);
            font-size: 0.95rem;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="bar">
            <h1 class="title">Geo-Spatial Analysis</h1>
            <p class="subtitle">Standalone terrain and remote-sensing page for mapped surfaces and geospatial features.</p>
        </header>
        <iframe src="/frontend/geospatial-analysis.html" title="Geo-Spatial Analysis"></iframe>
    </div>
</body>
</html>

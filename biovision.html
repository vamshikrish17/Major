<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BioVision</title>
    <style>
        :root {
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(16, 185, 129, 0.16), transparent 32%),
                radial-gradient(circle at bottom right, rgba(52, 211, 153, 0.18), transparent 34%),
                #061612;
            color: #f8fafc;
            font-family: Inter, system-ui, sans-serif;
        }

        .shell {
            min-height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .bar {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(110, 231, 183, 0.18);
            background: rgba(6, 22, 18, 0.9);
            backdrop-filter: blur(14px);
        }

        .title {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #6ee7b7;
        }

        .subtitle {
            margin: 6px 0 0;
            color: rgba(220, 252, 231, 0.72);
            font-size: 0.95rem;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="bar">
            <h1 class="title">BioVision</h1>
            <p class="subtitle">Standalone biological imaging page for cells, structures, and specimen analysis.</p>
        </header>
        <iframe src="/frontend/biovision.html" title="BioVision"></iframe>
    </div>
</body>
</html>
